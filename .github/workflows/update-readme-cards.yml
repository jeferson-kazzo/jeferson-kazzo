name: Atualizar cartoes do README

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme-cards
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositorio
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Gerar estatisticas
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2
        with:
          card: stats
          options: "username=jeferson-kazzo&show_icons=true&include_all_commits=true&count_private=true&custom_title=Estatisticas&locale=pt-br&title_color=7957d5&text_color=539bf5&icon_color=ff3860&bg_color=0000&hide_border=true"
          path: profile/stats.svg
          token: ${{ secrets.README_STATS_TOKEN }}

      - name: Gerar linguagens mais usadas
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2
        with:
          card: top-langs
          options: "username=jeferson-kazzo&layout=compact&hide_title=true&locale=pt-br&text_color=1d87da&bg_color=0000&hide_border=true"
          path: profile/top-langs.svg
          token: ${{ secrets.README_STATS_TOKEN }}

      - name: Publicar cartoes atualizados
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg profile/top-langs.svg
          git diff --cached --quiet && exit 0
          git commit -m "Atualiza estatisticas do perfil"
          git push
